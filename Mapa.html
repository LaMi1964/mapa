<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Test GeoJSON – SPS</title>

    <!-- Mapy.cz API s tvým API klíčem -->
    <script src="https://api.mapy.cz/loader.js?key=xdEO_5ypq47OC5Z5RD2-HJSay-0Mqd5LCB2GcyiOwyI"></script>
    <script>
        Loader.async = true;
        Loader.load(null, { modules: ["map", "marker"] });
    </script>

    <style>
        #map {
            width: 100%;
            height: 600px;
            margin-top: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>
    <h1>Automatické načtení GeoJSON – SPS</h1>

    <div id="map"></div>

    <script>
        Loader.onready = function () {

            // Inicializace mapy
            var center = SMap.Coords.fromWGS84(14.42076, 50.08804);
            var map = new SMap(JAK.gel("map"), center, 10);
            map.addDefaultLayer(SMap.DEF_BASE).enable();
            map.addDefaultControls();

            var layer = new SMap.Layer.Marker();
            map.addLayer(layer);
            layer.enable();

            // Načtení GeoJSON z GitHub Pages
            fetch("pristaviste.geojson", { cache: "no-store" })
                .then(r => r.text())
                .then(text => {
                    // Ručně převedeme text na JSON (bez ohledu na MIME typ)
                    const geojson = JSON.parse(text);

                    let coordsList = [];

                    geojson.features.forEach(f => {
                        let coords = f.geometry.coordinates;
                        let c = SMap.Coords.fromWGS84(coords[0], coords[1]);
                        coordsList.push(c);

                        let marker = new SMap.Marker(c, null, {
                            title: f.properties.nazev
                        });

                        layer.addMarker(marker);
                    });

                    if (coordsList.length > 0) {
                        let bbox = SMap.Coords.getBox(coordsList);
                        map.setCenterZoom(bbox.getCenter(), 14);
                    }
                })
                .catch(err => {
                    console.error("Chyba při načítání GeoJSON:", err);
                    alert("Nepodařilo se načíst GeoJSON.");
                });
        };
    </script>
</body>
</html>
